<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помощник по уходу за растениями PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-modal" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f8faf9; z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div id="login-form-box" style="background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px;">
            <h2 style="margin-bottom: 20px; font-weight: 800; color: #1f2937;">Вход в систему</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group" style="margin-top: 12px;">
                    <label>Пароль</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%;">Войти</button>
            </form>
            <p style="margin-top: 16px; font-size: 0.9rem; text-align: center; color: #6b7280;">
                Нет аккаунта? <a href="#" onclick="toggleAuthForms(event, 'signup')" style="color: #10b981; font-weight: 600; text-decoration: none;">Зарегистрироваться</a>
            </p>
        </div>
        <div id="signup-form-box" style="background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; display: none;">
            <h2 style="margin-bottom: 20px; font-weight: 800; color: #1f2937;">Регистрация</h2>
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Создайте никнейм</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group" style="margin-top: 12px;">
                    <label>Создайте пароль</label>
                    <input type="password" id="signup-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%;">Зарегистрироваться</button>
            </form>
            <p style="margin-top: 16px; font-size: 0.9rem; text-align: center; color: #6b7280;">
                Уже есть аккаунт? <a href="#" onclick="toggleAuthForms(event, 'login')" style="color: #10b981; font-weight: 600; text-decoration: none;">Войти</a>
            </p>
        </div>
    </div>

    <div id="sidebar">
        <h2>Уход за растениями</h2>
        <button class="menu-btn active" onclick="switchPage('catalog')">Справочник</button>
        <button class="menu-btn" onclick="switchPage('my-plants')">Моя коллекция</button>
        <button class="menu-btn" onclick="switchPage('favorites')">Избранное</button>
        
        <div id="alert-panel" style="display: none;">
            <div class="alert-title">🚨 Внимание!</div>
            <ul id="alert-list"></ul>
        </div>
    </div>

    <div id="main-content">
        <div id="catalog" class="page active">
            <h1>Справочник растений</h1>
            <div id="catalog-list" class="grid"></div>
        </div>

        <div id="my-plants" class="page">
            <h1>Моя коллекция</h1>
            <div id="my-plants-list" class="grid"></div>
        </div>

        <div id="favorites" class="page">
            <h1>Избранные растения</h1>
            <div id="favorites-list" class="grid"></div>
        </div>

        <div id="add-to-collection-page" class="page">
            <h1>Добавить растение в коллекцию</h1>
            <form id="collection-form" onsubmit="saveToCollection(event)" style="max-width: 500px;">
                <input type="hidden" id="form-plant-id">
                <div class="form-group">
                    <label>Название растения</label>
                    <input type="text" id="form-plant-name" readonly>
                </div>
                <div class="form-group">
                    <label>Заметки по уходу</label>
                    <textarea id="form-plant-notes" rows="3" placeholder="Например: стоит на южном окне"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Интервал полива</label>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Дни</span>
                            <input type="number" id="form-plant-water-days" min="0" value="7" style="width: 100%;">
                        </div>
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Часы</span>
                            <input type="number" id="form-plant-water-hours" min="0" max="23" value="0" style="width: 100%;">
                        </div>
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Минуты</span>
                            <input type="number" id="form-plant-water-mins" min="0" max="59" value="0" style="width: 100%;">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Интервал пересадки</label>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Дни</span>
                            <input type="number" id="form-plant-repot-days" min="0" value="30" style="width: 100%;">
                        </div>
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Часы</span>
                            <input type="number" id="form-plant-repot-hours" min="0" max="23" value="0" style="width: 100%;">
                        </div>
                        <div style="flex: 1;">
                            <span style="font-size: 0.8rem; color: #6b7280;">Минуты</span>
                            <input type="number" id="form-plant-repot-mins" min="0" max="59" value="0" style="width: 100%;">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Сохранить в коллекцию</button>
                <button type="button" class="btn btn-secondary" onclick="switchPage('catalog')">Отмена</button>
            </form>
        </div>
    </div>

    <div id="notification-toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
